{# Unified user dock: popover menu + white pill + Upgrade plan #}
{% set dock_wrap_id = dock_wrap_id|default('globalUserDockWrap') %}
{% set dock_wrap_class = dock_wrap_class|default('digiseo-user-dock-wrap global-user-dock-wrap') %}
<div id="{{ dock_wrap_id }}" class="{{ dock_wrap_class }}" data-digiseo-user-dock-root aria-label="Tài khoản & nâng cấp">
    <div class="user-menu-popover" id="userMenuPopover" hidden role="menu">
        <button type="button" class="user-menu-item" id="userMenuAccount" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Tài khoản
        </button>
        <button type="button" class="user-menu-item" id="userMenuHistory" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Lịch sử
            <span class="user-menu-chev" aria-hidden="true">›</span>
        </button>
        <button type="button" class="user-menu-item" id="userMenuPackage" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            Gói dịch vụ
        </button>
        <button type="button" class="user-menu-item" id="userMenuSession" role="menuitem">
            <svg id="userMenuSessionIconIn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            <svg id="userMenuSessionIconOut" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span id="userMenuSessionLabel">Đăng nhập</span>
        </button>
    </div>
    <div class="user-dock-top" aria-hidden="true"><span class="user-dock-top-chev">▼</span></div>
    <div class="user-pill">
        <button type="button" class="user-pill-main" id="userPill" aria-haspopup="menu" aria-expanded="false" aria-controls="userMenuPopover">
            <span class="user-avatar is-guest" id="userDockAvatar">?</span>
            <span class="user-name" id="userDockLabel">Chưa đăng nhập</span>
        </button>
        <button type="button" class="user-pill-dismiss" id="userPillDismiss" aria-label="Đóng menu tài khoản">×</button>
    </div>
    <button type="button" class="digiseo-upgrade-strip" data-digiseo-pricing-open>Upgrade plan</button>
</div>
