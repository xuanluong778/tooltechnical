{# Floating chatbot — bottom right; avatar: /static/img/digiseo-chatbot-avatar.png #}
<div id="digiseoChatbotRoot" class="digiseo-chatbot-root" aria-hidden="true">
    <div class="digiseo-chatbot-panel" id="digiseoChatbotPanel" role="dialog" aria-labelledby="digiseoChatbotTitle" aria-modal="false">
        <header class="digiseo-chatbot-head">
            <img class="digiseo-chatbot-avatar" src="/static/img/digiseo-chatbot-avatar.png" width="44" height="44" alt="" aria-hidden="true">
            <div class="digiseo-chatbot-head-text">
                <strong id="digiseoChatbotTitle">Trợ lý DigiSEO</strong>
                <span class="digiseo-chatbot-status"><span class="digiseo-chatbot-status-dot" aria-hidden="true"></span> Đang trực tuyến</span>
            </div>
            <button type="button" class="digiseo-chatbot-close" id="digiseoChatbotClose" aria-label="Đóng chat">×</button>
        </header>
        <div class="digiseo-chatbot-messages" id="digiseoChatbotMessages" role="log" aria-live="polite"></div>
        <div class="digiseo-chatbot-quick" id="digiseoChatbotQuick" aria-label="Câu hỏi nhanh"></div>
        <footer class="digiseo-chatbot-foot">
            <textarea class="digiseo-chatbot-input" id="digiseoChatbotInput" rows="1" placeholder="Nhập câu hỏi…" maxlength="4000" aria-label="Tin nhắn"></textarea>
            <button type="button" class="digiseo-chatbot-send" id="digiseoChatbotSend" aria-label="Gửi">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </footer>
    </div>
    <button type="button" class="digiseo-chatbot-fab" id="digiseoChatbotFab" aria-label="Mở trợ lý chat" title="Chat với DigiSEO">
        <img src="/static/img/digiseo-chatbot-avatar.png" width="56" height="56" alt="">
    </button>
</div>
